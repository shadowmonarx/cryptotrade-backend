# ─────────────────────────────────────────────────────────────────────────────
# Railway Variables tab: set DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD,
# FIREBASE_CONFIG, CORS_ALLOWED_ORIGINS
