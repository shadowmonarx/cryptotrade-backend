# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-plain-lake-a1jpyugg-pooler.ap-southeast-1.aws.neon.tech/neondb}
spring.datasource.username=${DATABASE_USERNAME:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:npg_qTxiHov2sL8V}
spring.datasource.hikari.data-source-properties.sslmode=require

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Firebase ──────────────────────────────────────────────────────────────────
# FIX: was commented out — FirebaseConfig reads this to load credentials
# In Railway Variables tab: FIREBASE_CONFIG = full JSON contents of service account file
firebase.service-account-json=${FIREBASE_CONFIG:}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
