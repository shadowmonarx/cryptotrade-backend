# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-plain-lake-a1jpyugg-pooler.ap-southeast-1.aws.neon.tech/neondb}
spring.datasource.username=${DATABASE_USERNAME:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:npg_qTxiHov2sL8V}
